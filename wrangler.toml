name = "stratt"
main = "src/index.js"
compatibility_date = "2025-05-07"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# KV namespace for conversation memory + gamification
[[kv_namespaces]]
binding = "CHAT_MEMORY"
id = "2e87de8f1a4e45d09ac79fcc88a92d86"

# Cron Triggers — 5 max on free plan
# Internal dispatch in reminders.js handles VN timezone mapping
[triggers]
crons = [
  "0 1 * * 1-5",     # 08:00 VN T2-T6 — Morning briefing
  "30 3-9 * * 1-5",  # :30 marks from 10:30-16:30 VN T2-T6 — Drift/Afternoon/Push
  "30 2 * * 6",      # 09:30 VN T7 — Weekend morning (also CN via dispatch)
  "0 13 * * 6",      # 20:00 VN T7 — Weekend evening (also CN via dispatch)
  "30 16 * * 1-5"    # 23:30 VN T2-T6 — Auto-defer + daily summary
]
