name = "warroom"
main = "src/index.js"
compatibility_date = "2025-05-07"

[assets]
directory = "./public"

# Cron Triggers — auto-reminders via Telegram (VN = UTC+7)
# 1. 10:30 VN T2-T5 (Office morning)
# 2. 09:30 VN T6-CN (WFH/Weekend morning)  — T6=WFH brief, T7-CN=weekly review
# 3. 13:30 VN T2-T6 (Afternoon check)
# 4. 23:00 VN T2-T6 (Power Block)
# 5. 20:00 VN T7-CN (Weekend evening prep)
[triggers]
crons = ["30 3 * * 1-4", "30 2 * * 5-7", "30 6 * * 1-5", "0 16 * * 1-5", "0 13 * * 6-7"]
