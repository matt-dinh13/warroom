<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stratt — AI Task Commander for ADHD productivity">
  <title>🚀 Stratt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ═══ PASSWORD GATE ═══ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">🚀</span>
        <h1>STRATT</h1>
        <p class="auth-subtitle">Mission Command Center</p>
      </div>
      <form id="auth-form" class="auth-form">
        <div class="input-group">
          <input
            type="password"
            id="auth-password"
            placeholder="Enter password..."
            autocomplete="current-password"
            required
          >
          <button type="submit" id="auth-submit">
            <span class="btn-text">ACCESS</span>
            <span class="btn-loader" hidden></span>
          </button>
        </div>
        <p id="auth-error" class="auth-error" hidden>Sai mật khẩu</p>
      </form>
    </div>
    <div class="auth-particles"></div>
  </div>

  <!-- ═══ MAIN CHAT ═══ -->
  <div id="chat-screen" class="screen">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <span class="header-icon">🚀</span>
        <div>
          <h1>Stratt</h1>
          <span class="header-status" id="header-status">
            <span class="status-dot"></span>
            Online
          </span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-time" id="header-time"></span>
      </div>
    </header>

    <!-- Messages -->
    <main class="chat-messages" id="chat-messages">
      <div class="message bot">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <p>Chào Matt! 👋 Gõ task để capture, hoặc dùng quick actions bên dưới. <i>"I'm reasonably sure this will work."</i></p>
        </div>
      </div>
    </main>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="quick-btn" data-action="plan today" id="btn-plan-today">
        <span class="quick-icon">📋</span>
        <span>Plan Today</span>
      </button>
      <button class="quick-btn" data-action="check load" id="btn-check-load">
        <span class="quick-icon">📊</span>
        <span>Check Load</span>
      </button>
      <button class="quick-btn" data-action="bỏ quên gì không?" id="btn-overdue">
        <span class="quick-icon">⚠️</span>
        <span>Overdue</span>
      </button>
      <button class="quick-btn" data-action="summary tuần" id="btn-report">
        <span class="quick-icon">📈</span>
        <span>Report</span>
      </button>
    </div>

    <!-- Input -->
    <form class="chat-input-area" id="chat-form">
      <div class="input-wrapper">
        <textarea
          id="chat-input"
          placeholder="Gõ task, câu hỏi, hoặc command..."
          rows="1"
          maxlength="2000"
        ></textarea>
        <button type="submit" id="chat-submit" class="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
